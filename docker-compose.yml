services:
  db:
    build: ./mysql
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: govwifi_test
    expose:
      - "3306"

  app:
    build: .
    environment:
      DB_NAME: govwifi_test
      DB_PASS: root
      DB_USER: root
      DB_HOSTNAME: db
      RACK_ENV: development
      MARIADB_TLS_DISABLE_PEER_VERIFICATION: 1
    links:
      - db
    expose:
      - "8080"
